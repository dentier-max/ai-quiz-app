<body>
<div class="app-container">
  <!-- Header -->
  <header class="app-header">
    <h1>AI通识B 刷题助手</h1>
    <div class="header-actions">
      <button class="btn-icon" id="themeToggle" title="切换主题">&#9788;</button>
      <button class="btn-icon" id="settingsBtn" title="设置">&#9881;</button>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav-tabs">
    <button class="nav-tab active" data-view="practice">顺序练习</button>
    <button class="nav-tab" data-view="random">随机练习</button>
    <button class="nav-tab" data-view="wrong">错题本</button>
    <button class="nav-tab" data-view="favorites">收藏夹</button>
    <button class="nav-tab" data-view="browse">题目列表</button>
    <button class="nav-tab" data-view="stats">学习统计</button>
  </nav>

  <!-- Views -->
  <div id="app-views">
    <!-- Practice View -->
    <div class="view fade-in" id="view-practice">
      <div class="card" id="practice-card">
        <div class="question-header">
          <span class="question-number" id="q-number">第 1 / 90 题</span>
          <div class="question-tags">
            <span class="tag chapter" id="q-chapter">第1章</span>
            <span class="tag" id="q-type">单选题</span>
          </div>
          <button class="star-btn" id="q-starBtn" title="收藏">&#9734;</button>
        </div>
        <div class="question-stem" id="q-stem">加载中...</div>
        <div class="options-list" id="q-options"></div>
        <div class="answer-feedback" id="q-feedback">
          <div class="feedback-title" id="feedback-title"></div>
          <div class="feedback-detail" id="feedback-detail"></div>
          <div class="feedback-analysis" id="feedback-analysis"></div>
        </div>
        <div class="action-bar">
          <button class="btn btn-primary" id="submitBtn">提交答案</button>
          <button class="btn btn-secondary" id="nextBtn" style="display:none">下一题</button>
          <button class="btn btn-secondary" id="prevBtn">上一题</button>
          <button class="btn btn-secondary" id="hintBtn">查看解析</button>
          <button class="btn btn-secondary" id="viewAllBtn">查看全部</button>
        </div>
      </div>
      <div class="question-grid" id="practice-grid"></div>
      <!-- All Questions List (hidden by default) -->
      <div id="all-questions-container" style="display:none;">
        <div class="card" style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <h3 style="font-size:1rem;">全部题目列表</h3>
            <button class="btn btn-secondary" id="backToSingleBtn">返回单题</button>
          </div>
        </div>
        <div id="all-questions-list"></div>
      </div>
    </div>

    <!-- Random View -->
    <div class="view fade-in" id="view-random" style="display:none">
      <div class="card" id="random-card">
        <div class="question-header">
          <span class="question-number" id="r-number">随机第 1 题</span>
          <div class="question-tags">
            <span class="tag chapter" id="r-chapter">第1章</span>
            <span class="tag" id="r-type">单选题</span>
          </div>
          <button class="star-btn" id="r-starBtn" title="收藏">&#9734;</button>
        </div>
        <div class="question-stem" id="r-stem">点击"开始随机练习"开始</div>
        <div class="options-list" id="r-options"></div>
        <div class="answer-feedback" id="r-feedback">
          <div class="feedback-title" id="r-feedback-title"></div>
          <div class="feedback-detail" id="r-feedback-detail"></div>

// ========== STATE ==========
const state = {
  currentView: 'practice',
  practiceIndex: 0,
  randomIndex: 0,
  wrongIndex: 0,
  favIndex: 0,
  selectedOption: null,
  answered: false,
  randomOrder: [],
  wrongList: [],
  favList: [],
  favorites: new Set(),
  userAnswers: {},
  settings: {
    autoShow: false,
    shuffleOptions: false
  }
};

// ========== UTILS ==========
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatStem(stem) {
  // Format code blocks
  stem = stem.replace(/`([^`]+)`/g, '<code class="code-block">$1</code>');
  return stem;
}

// ========== STORAGE ==========
function loadStorage() {
  try {
    const data = localStorage.getItem('aiQuizData');
    if (data) {
      const parsed = JSON.parse(data);
      state.favorites = new Set(parsed.favorites || []);
      state.userAnswers = parsed.userAnswers || {};
      state.settings = parsed.settings || { autoShow: false, shuffleOptions: false };
    }
  } catch(e) {}
}
function saveStorage() {
  localStorage.setItem('aiQuizData', JSON.stringify({
    favorites: Array.from(state.favorites),
    userAnswers: state.userAnswers,
    settings: state.settings
  }));
}

// ========== NAVIGATION ==========
function switchView(viewName) {
  state.currentView = viewName;
  $$('.view').forEach(v => v.style.display = 'none');
  $('#view-' + viewName).style.display = 'block';
  $$('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === viewName));

  if (viewName === 'practice') renderPractice();
  else if (viewName === 'random') renderRandom();
  else if (viewName === 'wrong') renderWrong();
  else if (viewName === 'favorites') renderFavorites();
  else if (viewName === 'browse') renderBrowse();
  else if (viewName === 'stats') renderStats();
}

// ========== RENDER QUESTION ==========
function getShuffledOptions(q) {
  if (!state.settings.shuffleOptions) {
    return q.options.map((opt, i) => ({ text: opt, letter: ['A','B','C','D'][i], originalIndex: i }));
  }
  const letters = ['A','B','C','D'];
  const opts = q.options.map((text, i) => ({ text, letter: letters[i], originalIndex: i }));
  return shuffleArray(opts);
}

function renderQuestionCard(q, prefix) {
  state.selectedOption = null;
  state.answered = false;

  $(`#${prefix}-stem`).innerHTML = formatStem(escapeHtml(q.stem));
  $(`#${prefix}-chapter`).textContent = q.chapter;
  $(`#${prefix}-type`).textContent = q.type.includes('程序') ? '程序题' : '单选题';

  // Star button
  const starBtn = $(`#${prefix}-starBtn`);
  starBtn.classList.toggle('favorited', state.favorites.has(q.id));
  starBtn.innerHTML = state.favorites.has(q.id) ? '&#9733;' : '&#9734;';
  starBtn.onclick = () => toggleFavorite(q.id, prefix);

  // Options
  const optsContainer = $(`#${prefix}-options`);
  optsContainer.innerHTML = '';
  const shuffled = getShuffledOptions(q);

  shuffled.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-item';
    btn.innerHTML = `<span class="option-letter">${opt.letter}</span><span class="option-text">${escapeHtml(opt.text)}</span>`;
    btn.onclick = () => {
      if (state.answered) return;
      state.selectedOption = opt.letter;
      $$('#' + prefix + '-options .option-item').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    optsContainer.appendChild(btn);
  });

  // Feedback
  const fb = $(`#${prefix}-feedback`);
  fb.classList.remove('show', 'correct', 'wrong');
  $(`#${prefix}-feedback-title`).textContent = '';
  $(`#${prefix}-feedback-detail`).textContent = '';
  $(`#${prefix}-feedback-analysis`).textContent = '';

  // Buttons
  const submitBtn = $(`#${prefix}-submitBtn`);
  const nextBtn = $(`#${prefix}-nextBtn`);
  const hintBtn = $(`#${prefix}-hintBtn`);

  if (submitBtn) { submitBtn.style.display = 'inline-flex'; submitBtn.disabled = false; }
  if (nextBtn) nextBtn.style.display = 'none';
  if (hintBtn) hintBtn.style.display = 'inline-flex';
}

function showAnswer(q, prefix, forceShow) {
  if (!state.answered && !forceShow) return;

  const fb = $(`#${prefix}-feedback`);
  const isCorrect = state.selectedOption === q.correctAnswer;

  fb.classList.add('show');
  fb.classList.toggle('correct', isCorrect);
  fb.classList.toggle('wrong', !isCorrect);

  const title = $(`#${prefix}-feedback-title`);
  title.className = 'feedback-title ' + (isCorrect ? 'correct' : 'wrong');
  title.textContent = isCorrect ? '回答正确！' : '回答错误';

  const detail = $(`#${prefix}-feedback-detail`);
  detail.textContent = `你的答案：${state.selectedOption || '未选择'} | 正确答案：${q.correctAnswer}`;

  const analysis = $(`#${prefix}-feedback-analysis`);
  if (q.analysis) {
    analysis.textContent = '解析：' + q.analysis;
  } else {
    analysis.textContent = '';
  }

  // Highlight options
  const optItems = $$('#' + prefix + '-options .option-item');
  optItems.forEach(item => {
    const letter = item.querySelector('.option-letter').textContent;
    item.classList.remove('selected');
    if (letter === q.correctAnswer) item.classList.add('correct');
    else if (letter === state.selectedOption && !isCorrect) item.classList.add('wrong');
  });

  // Save answer
  if (!state.userAnswers[q.id]) {
    state.userAnswers[q.id] = { answer: state.selectedOption, correct: isCorrect };
    saveStorage();
  }

  // Buttons
  const submitBtn = $(`#${prefix}-submitBtn`);
  const nextBtn = $(`#${prefix}-nextBtn`);
  if (submitBtn) submitBtn.style.display = 'none';
  if (nextBtn) nextBtn.style.display = 'inline-flex';
}

function toggleFavorite(qid, prefix) {
  if (state.favorites.has(qid)) {
    state.favorites.delete(qid);
    showToast('💧 已取消收藏');
  } else {
    state.favorites.add(qid);
    showToast('🌱 已收藏');
  }
  saveStorage();
  const starBtn = $(`#${prefix}-starBtn`);
  starBtn.classList.toggle('favorited', state.favorites.has(qid));
  starBtn.innerHTML = state.favorites.has(qid) ? '&#9733;' : '&#9734;';
}

// ========== PRACTICE MODE ==========
function renderPractice() {
  const q = QUESTIONS[state.practiceIndex];
  if (!q) return;
  $('#q-number').textContent = `第 ${state.practiceIndex + 1} / ${QUESTIONS.length} 题`;
  renderQuestionCard(q, 'q');
  renderPracticeGrid();
}

function renderPracticeGrid() {
  const grid = $('#practice-grid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'question-grid-item';
    div.textContent = i + 1;
    if (i === state.practiceIndex) div.classList.add('current');
    const ua = state.userAnswers[q.id];
    if (ua) {
      div.classList.add(ua.correct ? 'answered' : 'wrong');
    }
    div.onclick = () => { state.practiceIndex = i; renderPractice(); };
    grid.appendChild(div);
  });
}

// ========== ALL QUESTIONS LIST MODE ==========
function renderAllQuestions() {
  const container = $('#all-questions-list');
  container.innerHTML = '';

  QUESTIONS.forEach((q, idx) => {
    const item = document.createElement('div');
    item.className = 'all-q-item';

    // Header with number and chapter
    const header = document.createElement('div');
    header.className = 'all-q-header';
    header.innerHTML = `
      <span class="all-q-number">第 ${q.id} 题</span>
      <div class="question-tags">
        <span class="tag chapter">${q.chapter}</span>
        <span class="tag">${q.type.includes('程序') ? '程序题' : '单选题'}</span>
      </div>
    `;
    item.appendChild(header);

    // Stem
    const stem = document.createElement('div');
    stem.className = 'all-q-stem';
    stem.innerHTML = formatStem(escapeHtml(q.stem));
    item.appendChild(stem);

    // Options (only for questions with options)
    if (q.options && q.options.length > 0) {
      const optsDiv = document.createElement('div');
      optsDiv.className = 'all-q-options';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((optText, i) => {
        const optDiv = document.createElement('div');
        optDiv.className = 'all-q-option';
        optDiv.innerHTML = `
          <span class="all-q-option-letter">${letters[i]}</span>
          <span>${escapeHtml(optText)}</span>
        `;
        optsDiv.appendChild(optDiv);
      });
      item.appendChild(optsDiv);
    }

    // Correct answer
    const answerDiv = document.createElement('div');
    answerDiv.className = 'all-q-answer';
    answerDiv.innerHTML = `<strong>正确答案：</strong>${q.correctAnswer}`;
    item.appendChild(answerDiv);

    // Analysis (if exists)
    if (q.analysis) {
      const analysisDiv = document.createElement('div');
      analysisDiv.className = 'all-q-analysis';
      analysisDiv.textContent = '解析：' + q.analysis;
      item.appendChild(analysisDiv);
    }

    // Click to jump to single question
    item.style.cursor = 'pointer';
    item.onclick = (e) => {
      // Don't jump if clicking on code block (for copy)
      if (e.target.tagName === 'CODE') return;
      state.practiceIndex = idx;
      $('#all-questions-container').style.display = 'none';
      $('#practice-card').style.display = 'block';
      $('#practice-grid').style.display = 'grid';
      renderPractice();
    };

    container.appendChild(item);
  });
}

// ========== RANDOM MODE ==========
function renderRandom() {
  if (state.randomOrder.length === 0) {
    $('#r-stem').textContent = '点击"开始随机练习"开始';
    $('#r-options').innerHTML = '';
    $('#r-feedback').classList.remove('show');
    $('#r-startBtn').style.display = 'inline-flex';
    $('#r-submitBtn').style.display = 'none';
    $('#r-nextBtn').style.display = 'none';
    $('#r-hintBtn').style.display = 'none';
    return;
  }
  const qid = state.randomOrder[state.randomIndex];
  const q = QUESTIONS.find(q => q.id === qid);
  $('#r-number').textContent = `随机第 ${state.randomIndex + 1} / ${state.randomOrder.length} 题`;
  renderQuestionCard(q, 'r');
  $('#r-startBtn').style.display = 'none';
  $('#r-submitBtn').style.display = 'inline-flex';
  $('#r-hintBtn').style.display = 'inline-flex';
}

function startRandom() {
  state.randomOrder = shuffleArray(QUESTIONS.map(q => q.id));
  state.randomIndex = 0;
  renderRandom();
}

// ========== WRONG MODE ==========
function renderWrong() {
  state.wrongList = QUESTIONS.filter(q => {
    const ua = state.userAnswers[q.id];
    return ua && !ua.correct;
  }).map(q => q.id);

  if (state.wrongList.length === 0) {
    $('#view-wrong').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128522;</div>
        <h3>暂无错题</h3>
        <p>太棒了！你还没有答错的题目，继续保持！</p>
      </div>`;
    return;
  }

  // Restore layout if was empty
  if (!$('#wrong-card')) {
    location.reload(); // Simplest way to restore
    return;
  }

  const qid = state.wrongList[state.wrongIndex];
  const q = QUESTIONS.find(q => q.id === qid);
  $('#w-number').textContent = `错题第 ${state.wrongIndex + 1} / ${state.wrongList.length} 题`;
  renderQuestionCard(q, 'w');
  renderWrongGrid();
}

function renderWrongGrid() {
  const grid = $('#wrong-grid');
  if (!grid) return;
  grid.innerHTML = '';
  state.wrongList.forEach((qid, i) => {
    const div = document.createElement('div');
    div.className = 'question-grid-item wrong';
    const q = QUESTIONS.find(q => q.id === qid);
    div.textContent = q ? q.id : i + 1;
    if (i === state.wrongIndex) div.classList.add('current');
    div.onclick = () => { state.wrongIndex = i; renderWrong(); };
    grid.appendChild(div);
  });
}

// ========== FAVORITES MODE ==========
function renderFavorites() {
  state.favList = QUESTIONS.filter(q => state.favorites.has(q.id)).map(q => q.id);

  if (state.favList.length === 0) {
    $('#view-favorites').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128150;</div>
        <h3>暂无收藏</h3>
        <p>点击题目中的星星图标来收藏题目</p>
      </div>`;
    return;
  }

  if (!$('#fav-card')) {
    location.reload();
    return;
  }

  const qid = state.favList[state.favIndex];
  const q = QUESTIONS.find(q => q.id === qid);
  $('#f-number').textContent = `收藏第 ${state.favIndex + 1} / ${state.favList.length} 题`;
  renderQuestionCard(q, 'f');
  renderFavGrid();
}

function renderFavGrid() {
  const grid = $('#fav-grid');
  if (!grid) return;
  grid.innerHTML = '';
  state.favList.forEach((qid, i) => {
    const div = document.createElement('div');
    div.className = 'question-grid-item';
    const q = QUESTIONS.find(q => q.id === qid);
    div.textContent = q ? q.id : i + 1;
    if (i === state.favIndex) div.classList.add('current');
    div.onclick = () => { state.favIndex = i; renderFavorites(); };
    grid.appendChild(div);
  });
}

// ========== BROWSE MODE ==========
let browseFilter = 'all';
function renderBrowse() {
  const list = $('#browse-list');
  list.innerHTML = '';

  const filtered = browseFilter === 'all'
    ? QUESTIONS
    : QUESTIONS.filter(q => q.chapter === browseFilter);

  filtered.forEach(q => {
    const card = document.createElement('div');
    card.className = 'card';
    const ua = state.userAnswers[q.id];
    const statusIcon = ua ? (ua.correct ? '&#9989;' : '&#10060;') : '';
    const isFav = state.favorites.has(q.id) ? '&#9733;' : '';

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span class="question-number">第 ${q.id} 题</span>
        <span>${statusIcon} ${isFav}</span>
      </div>
      <div style="font-size:0.95rem;margin-bottom:10px;">${escapeHtml(q.stem)}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <span class="tag chapter">${q.chapter}</span>
        <span class="tag">${q.type.includes('程序') ? '程序题' : '单选题'}</span>
        ${ua ? `<span class="tag">你的答案: ${ua.answer}</span>` : ''}
      </div>
    `;
    card.onclick = () => {
      state.practiceIndex = QUESTIONS.findIndex(q2 => q2.id === q.id);
      switchView('practice');
    };
    list.appendChild(card);
  });
}

// ========== STATS MODE ==========
function renderStats() {
  const answeredIds = Object.keys(state.userAnswers);
  const correctCount = answeredIds.filter(id => state.userAnswers[id].correct).length;
  const wrongCount = answeredIds.length - correctCount;
  const rate = answeredIds.length > 0 ? Math.round(correctCount / answeredIds.length * 100) : 0;

  $('#stat-correct').textContent = correctCount;
  $('#stat-wrong').textContent = wrongCount;
  $('#stat-rate').textContent = rate + '%';
  $('#stat-progress').textContent = answeredIds.length;
  $('#stat-fav').textContent = state.favorites.size;

  // Chapter stats
  const chapterStats = {};
  QUESTIONS.forEach(q => {
    const ch = q.chapter;
    if (!chapterStats[ch]) chapterStats[ch] = { total: 0, correct: 0, answered: 0 };
    chapterStats[ch].total++;
    const ua = state.userAnswers[q.id];
    if (ua) {
      chapterStats[ch].answered++;
      if (ua.correct) chapterStats[ch].correct++;
    }
  });

  const statsContainer = $('#chapter-stats');
  statsContainer.innerHTML = '';
  Object.entries(chapterStats).forEach(([ch, data]) => {
    const pct = data.answered > 0 ? Math.round(data.correct / data.answered * 100) : 0;
    const div = document.createElement('div');
    div.style.cssText = 'margin-bottom:12px;';
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:4px;">
        <span>${ch}</span>
        <span style="color:var(--muted);">${data.correct}/${data.answered} (${pct}%)</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
    statsContainer.appendChild(div);
  });

  // Progress
  const progressPct = Math.round(answeredIds.length / QUESTIONS.length * 100);
  $('#stat-progress-bar').style.width = progressPct + '%';
  $('#stat-progress-text').textContent = `${answeredIds.length} / ${QUESTIONS.length} 题已完成`;
}

// ========== EVENT LISTENERS ==========
function setupEventListeners() {
  // Nav tabs
  $$('.nav-tab').forEach(tab => {
    tab.onclick = () => switchView(tab.dataset.view);
  });

  // Practice buttons
  $('#submitBtn').onclick = () => {
    const q = QUESTIONS[state.practiceIndex];
    if (!state.selectedOption) { showToast('🌿 请先选择一个答案'); return; }
    state.answered = true;
    showAnswer(q, 'q', false);
    renderPracticeGrid();
  };
  $('#nextBtn').onclick = () => {
    if (state.practiceIndex < QUESTIONS.length - 1) {
      state.practiceIndex++;
      renderPractice();
    } else {
      showToast('🍃 已经是最后一题了');
    }
  };
  $('#prevBtn').onclick = () => {
    if (state.practiceIndex > 0) {
      state.practiceIndex--;
      renderPractice();
    }
  };
  $('#hintBtn').onclick = () => {
    const q = QUESTIONS[state.practiceIndex];
    state.selectedOption = state.selectedOption || '未选择';
    state.answered = true;
    showAnswer(q, 'q', true);
    renderPracticeGrid();
  };

  // View All / Back to Single buttons
  $('#viewAllBtn').onclick = () => {
    $('#practice-card').style.display = 'none';
    $('#practice-grid').style.display = 'none';
    $('#all-questions-container').style.display = 'block';
    renderAllQuestions();
  };
  $('#backToSingleBtn').onclick = () => {
    $('#all-questions-container').style.display = 'none';
    $('#practice-card').style.display = 'block';
    $('#practice-grid').style.display = 'grid';
    renderPractice();
  };

  // Random buttons
  $('#r-startBtn').onclick = startRandom;
  $('#r-submitBtn').onclick = () => {
    const qid = state.randomOrder[state.randomIndex];
    const q = QUESTIONS.find(q => q.id === qid);
    if (!state.selectedOption) { showToast('🌿 请先选择一个答案'); return; }
    state.answered = true;
    showAnswer(q, 'r', false);
  };
  $('#r-nextBtn').onclick = () => {
    if (state.randomIndex < state.randomOrder.length - 1) {
      state.randomIndex++;
      renderRandom();
    } else {
      showToast('🌱 随机练习已完成！');
      state.randomOrder = [];
      renderRandom();
    }
  };
  $('#r-hintBtn').onclick = () => {
    const qid = state.randomOrder[state.randomIndex];
    const q = QUESTIONS.find(q => q.id === qid);
    state.selectedOption = state.selectedOption || '未选择';
    state.answered = true;
    showAnswer(q, 'r', true);
  };

  // Wrong buttons
  $('#w-submitBtn').onclick = () => {
    const qid = state.wrongList[state.wrongIndex];
    const q = QUESTIONS.find(q => q.id === qid);
    if (!state.selectedOption) { showToast('🌿 请先选择一个答案'); return; }
    state.answered = true;
    showAnswer(q, 'w', false);
    renderWrongGrid();
  };
  $('#w-nextBtn').onclick = () => {
    if (state.wrongIndex < state.wrongList.length - 1) {
      state.wrongIndex++;
      renderWrong();
    } else {
      showToast('🍃 错题练习已完成！');
    }
  };
  $('#w-hintBtn').onclick = () => {
    const qid = state.wrongList[state.wrongIndex];
    const q = QUESTIONS.find(q => q.id === qid);
    state.selectedOption = state.selectedOption || '未选择';
    state.answered = true;
    showAnswer(q, 'w', true);
  };

  // Favorites buttons
  $('#f-submitBtn').onclick = () => {
    const qid = state.favList[state.favIndex];
    const q = QUESTIONS.find(q => q.id === qid);
    if (!state.selectedOption) { showToast('🌿 请先选择一个答案'); return; }
    state.answered = true;
    showAnswer(q, 'f', false);
    renderFavGrid();
  };
  $('#f-nextBtn').onclick = () => {
    if (state.favIndex < state.favList.length - 1) {
      state.favIndex++;
      renderFavorites();
    } else {
      showToast('🌱 收藏练习已完成！');
    }
  };
  $('#f-hintBtn').onclick = () => {
    const qid = state.favList[state.favIndex];
    const q = QUESTIONS.find(q => q.id === qid);
    state.selectedOption = state.selectedOption || '未选择';
    state.answered = true;
    showAnswer(q, 'f', true);
  };

  // Browse filters
  $$('#filter-chips .chip').forEach(chip => {
    chip.onclick = () => {
      $$('#filter-chips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      browseFilter = chip.dataset.filter;
      renderBrowse();
    };
  });

  // Theme toggle
  $('#themeToggle').onclick = () => {
    const isDark = document.body.hasAttribute('data-theme');
    if (isDark) document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', 'dark');
    localStorage.setItem('aiQuizTheme', isDark ? 'light' : 'dark');
  };

  // Settings
  $('#settingsBtn').onclick = () => {
    $('#settingsPanel').classList.add('show');
    $('#settingsOverlay').classList.add('show');
  };
  $('#closeSettings').onclick = $('#settingsOverlay').onclick = () => {
    $('#settingsPanel').classList.remove('show');
    $('#settingsOverlay').classList.remove('show');
  };

  // Toggles
  $('#autoShowToggle').classList.toggle('on', state.settings.autoShow);
  $('#autoShowToggle').onclick = () => {
    state.settings.autoShow = !state.settings.autoShow;
    $('#autoShowToggle').classList.toggle('on', state.settings.autoShow);
    saveStorage();
  };
  $('#shuffleToggle').classList.toggle('on', state.settings.shuffleOptions);
  $('#shuffleToggle').onclick = () => {
    state.settings.shuffleOptions = !state.settings.shuffleOptions;
    $('#shuffleToggle').classList.toggle('on', state.settings.shuffleOptions);
    saveStorage();
  };

  // Clear data
  $('#clearDataBtn').onclick = () => {
    if (confirm('确定要清除所有学习记录吗？此操作不可恢复。')) {
      state.favorites.clear();
      state.userAnswers = {};
      saveStorage();
      showToast('💧 已清除所有记录');
      switchView('practice');
    }
  };

  // Export
  $('#exportBtn').onclick = () => {
    const data = {
      exportDate: new Date().toISOString(),
      favorites: Array.from(state.favorites),
      userAnswers: state.userAnswers,
      stats: {
        total: QUESTIONS.length,
        answered: Object.keys(state.userAnswers).length,
        correct: Object.values(state.userAnswers).filter(a => a.correct).length
      }
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ai-quiz-data.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('🍃 已导出学习记录');
  };
}

// ========== INIT ==========
function init() {
  loadStorage();

  // Restore theme
  const savedTheme = localStorage.getItem('aiQuizTheme');
  if (savedTheme === 'dark') document.body.setAttribute('data-theme', 'dark');

  setupEventListeners();
  renderPractice();
}

init();
</script>
</body>
</html>
