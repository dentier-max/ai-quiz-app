    {q:"BERT模型采用了哪种编码方式？（ ）",o:["单向（仅从左到右）","单向（仅从右到左）","双向（同时利用左右上下文）","无序随机编码"],a:2,r:"BERT采用双向编码方式，在预训练时同时利用左右上下文信息，通过掩码语言模型任务学习深层次语义表示。"},
    {q:"GPT系列模型与BERT的主要训练差异在于（ ）。",o:["使用的数据集规模不同","GPT仅采用上文预测，BERT采用双向预测","GPT参数规模更小","BERT不支持预训练"],a:1,r:"GPT采用自回归方式（仅用上文预测下文），BERT采用自编码方式（用双向上下文预测被掩码的词），这是两者训练方式的核心差异。"},
    {q:"Inception网络的核心创新在于使用了（ ）。",o:["不同大小的卷积核并行分支","更深的全连接层","循环结构","单一的1×1卷积核"],a:0,r:"Inception模块使用不同大小的卷积核（1×1、3×3、5×5）并行分支，在同一层捕获多尺度特征。"},
    {q:"DenseNet网络的主要特点是（ ）。",o:["使用残差连接","使用空洞卷积","使用注意力机制","在每一层与所有前面的层建立直接密集连接"],a:3,r:"DenseNet的特点是在每一层与所有前面的层建立直接密集连接，极大促进了梯度流动和特征复用。"},
    {q:"Vision Transformer（ViT）将图像处理为（ ）。",o:["像素矩阵直接输入","一维音频信号","固定大小的小块（patches）序列","颜色直方图"],a:2,r:"ViT将图像分割为固定大小的小块（patches），将每个patch展平后作为序列输入Transformer，开创了Transformer在视觉领域的应用。"},
    {q:"YOLOv8采用的无锚方法称为（ ）。",o:["Anchor-Free（无锚框）","Anchor-Based（基于锚框）","Region Proposal","Selective Search"],a:0,r:"YOLOv8采用了Anchor-Free（无锚框）方法，直接预测目标的中心点和边界，简化了检测流程。"},
    {q:"百度文心一言不具备以下哪项功能？（ ）",o:["自然语言理解与智能问答","文本生成与创作辅助","多语言支持与翻译","实时视频直播"],a:3,r:"文心一言是大语言模型，具备文本理解、生成、翻译等功能，但不具备实时视频直播功能。"},
    {q:"DeepSeek R1模型的特点是（ ）。",o:["仅能处理图像任务","必须付费才能使用","以低成本完成训练且性能卓越","只能处理中文"],a:2,r:"DeepSeek R1模型以低成本完成训练且性能卓越著称，通过创新的训练方法实现了高性价比。"},
    {q:"大模型的发展历程中，沉淀期（2006-2019年）以什么为代表？（ ）",o:["Transformer架构","CNN传统神经网络","GPT-3","YOLO系列"],a:1,r:"沉淀期以CNN传统神经网络为代表，深度学习在各个领域积累技术和应用。"},
    {q:"大模型在教育领域的主要作用不包括以下哪项？（ ）",o:["个性化教学","智能辅助备课","数据驱动的决策支持","代替教师完成课堂教学"],a:3,r:"大模型在教育领域的定位是辅助工具，而非代替教师完成课堂教学。教育的温度和互动性需要人类教师。"},
    {q:"大语言模型的一个主要局限是（ ）。",o:["计算速度太慢","无法处理图像","可能产生幻觉（一本正经胡说八道）","不能进行文本生成"],a:2,r:"大语言模型可能产生幻觉，即生成看似合理但实际错误的内容，这是其可靠性的主要挑战。"},
    {q:"以下哪项不是大模型技术的主要特征？（ ）",o:["庞大的参数规模","多任务学习能力","预训练与微调","完全不需要计算资源"],a:3,r:"大模型技术需要大量计算资源进行训练和推理，'完全不需要计算资源'明显错误。"},
    {q:"当前主流大模型的训练和运行主要依赖以下哪种硬件？（ ）",o:["普通CPU","GPU","机械硬盘","显示器"],a:1,r:"GPU（图形处理器）具有强大的并行计算能力，是大模型训练和推理的核心硬件。"},
    {q:"LeNet-5诞生于哪一年？（ ）",o:["1980年","1990年","1998年","2006年"],a:2,r:"LeNet-5由Yann LeCun于1998年提出，是最早的卷积神经网络之一，用于手写数字识别。"},
    {q:"BERT的双向编码使得模型在预训练阶段能够（ ）。",o:["同时利用左右上下文信息","只看左边文本","只看右边文本","随机打乱文本顺序"],a:0,r:"BERT的双向编码使其在预训练时能同时利用左右上下文信息，更好地理解词语在句子中的含义。"},
    {q:"华为盘古大模型的三层架构不包括以下哪一层？（ ）",o:["L0基础大模型","L1行业大模型","L2场景模型","L3超级大模型"],a:3,r:"盘古三层架构为L0基础大模型、L1行业大模型、L2场景模型，不包括L3超级大模型。"},
    {q:"Kimi大模型支持多少字的无损长文本输入？（ ）",o:["20万字","100万字","200万字","500万字"],a:2,r:"Kimi大模型支持200万字（即2M tokens）的无损长文本输入，是其核心竞争力之一。"},
    {q:"智谱AI源自哪个实验室？（ ）",o:["清华大学计算机系知识工程（KEG）实验室","北京大学计算机系","中科院自动化所","微软亚洲研究院"],a:0,r:"智谱AI源自清华大学计算机系知识工程（KEG）实验室，拥有深厚的学术背景。"},
    {q:"豆包实时语音大模型在哪一年正式推出？（ ）",o:["2024年5月","2024年11月","2024年12月","2025年1月"],a:3,r:"豆包实时语音大模型于2025年1月正式推出，实现了低延迟的实时语音交互。"},
    {q:"大模型的发展历程中，萌芽期以什么为代表？（ ）",o:["CNN（传统神经网络）","Transformer","GPT-3","YOLO"],a:0,r:"萌芽期以CNN（传统神经网络）为代表，为后续深度学习的发展奠定了基础。"},
    {q:"机器学习是人工智能的哪个分支领域？（ ）",o:["计算机视觉分支","自然语言处理分支","致力于研究如何通过计算机系统的学习和自动化推理的分支","机器人学分支"],a:2,r:"机器学习是致力于研究如何通过计算机系统的学习和自动化推理的分支，是AI的核心领域。"},
    {q:"被公认为'机器学习之父'的是（ ）。",o:["阿兰·图灵","CMU的Mitchell教授","杰弗里·辛顿","伊恩·古德费洛"],a:1,r:"CMU的Tom Mitchell教授被公认为'机器学习之父'，其著作《机器学习》是该领域的经典教材。"},
    {q:"机器学习的核心思想是（ ）。",o:["手动编写全部规则","用数据训练算法自动学习并改进性能","程序固定不变","仅靠逻辑推理"],a:1,r:"机器学习的核心思想是用数据训练算法自动学习并改进性能，而非手动编写规则。"},
    {q:"深度学习与机器学习的关系是（ ）。",o:["相互独立","深度学习是机器学习的一个分支","机器学习是深度学习的子集","同一种概念"],a:1,r:"深度学习是机器学习的一个分支，使用多层神经网络自动学习特征表示。"},
    {q:"感知器模型的提出者是（ ）。",o:["Frank Rosenblatt","Geoffrey Hinton","Vladimir Vapnik","Yann LeCun"],a:0,r:"感知器由Frank Rosenblatt于1958年提出，是最早的人工神经网络模型之一。"},
    {q:"图灵测试用于评估机器的（ ）。",o:["计算速度","智能水平","存储容量","通信能力"],a:1,r:"图灵测试用于评估机器的智能水平，测试机器是否能表现出与人类相当的智能行为。"},
    {q:"2012年ImageNet比赛取得突破的模型是（ ）。",o:["决策树","卷积神经网络CNN","SVM","KNN"],a:1,r:"2012年AlexNet（一种卷积神经网络CNN）在ImageNet比赛中取得突破性成绩，掀起了深度学习革命。"},
    {q:"生成对抗网络GAN的提出者是（ ）。",o:["Hinton","LeCun","Goodfellow","Sutskever"],a:2,r:"生成对抗网络（GAN）由Ian Goodfellow于2014年提出，通过生成器和判别器的对抗训练生成逼真数据。"},
    {q:"以下哪项不属于机器学习的主要特点？（ ）",o:["数据驱动","模型多样","应用广泛","无需数据即可训练"],a:3,r:"机器学习是数据驱动的，'无需数据即可训练'明显错误，数据是机器学习的基础。"},
    {q:"专家系统属于人工智能哪个流派？（ ）",o:["连接主义","符号主义","行为主义","进化主义"],a:1,r:"专家系统属于符号主义流派，基于显式的知识表示和逻辑推理规则。"},
    {q:"深度学习中的'深度'指的是（ ）。",o:["数据量大","神经网络层数多","计算速度快","模型精度高"],a:1,r:"深度学习中的'深度'指的是神经网络层数多，能够学习更抽象的特征表示。"},
    {q:"AlphaGo主要基于哪种学习方式？（ ）",o:["监督学习","无监督学习","强化学习","迁移学习"],a:2,r:"AlphaGo主要基于强化学习，通过自我对弈（自博弈）不断提升棋力。"},
    {q:"LSTM主要用于解决（ ）。",o:["图像分类","序列数据长期依赖问题","聚类任务","异常检测"],a:1,r:"LSTM（长短期记忆网络）主要用于解决序列数据的长期依赖问题，克服传统RNN的梯度消失。"},
    {q:"对卷积神经网络有突出贡献的学者是（ ）。",o:["Yann LeCun","香农","佩珀特","图灵"],a:0,r:"Yann LeCun对卷积神经网络有突出贡献，提出了LeNet-5，被誉为'卷积神经网络之父'。"},
    {q:"以下哪项不属于深度学习模型？（ ）",o:["CNN","RNN","LSTM","K-means"],a:3,r:"K-means是聚类算法，属于传统机器学习，不属于深度学习模型。CNN、RNN、LSTM均为深度学习模型。"},
    {q:"机器学习中的'经验'主要来源于（ ）。",o:["人工规则","数据","硬件","软件"],a:1,r:"机器学习中的'经验'主要来源于数据，通过从数据中学习来积累经验。"},
    {q:"机器学习三大主要分类不包括（ ）。",o:["监督学习","无监督学习","强化学习","迁移学习"],a:3,r:"三大主要分类是监督学习、无监督学习和强化学习，迁移学习是另一类学习范式。"},
    {q:"监督学习的数据特点是（ ）。",o:["带有标签","无标签","只有奖励","只有惩罚"],a:0,r:"监督学习的数据带有标签，模型从输入-输出对中学习映射关系。"},
    {q:"无监督学习的数据特点是（ ）。",o:["有标签","无标签","带奖励信号","带正确答案"],a:1,r:"无监督学习的数据无标签，模型需要自行发现数据中的结构或模式。"},
    {q:"强化学习通过什么实现学习？（ ）",o:["标签数据","聚类","与环境交互获得奖励","规则匹配"],a:2,r:"强化学习通过智能体与环境交互获得奖励或惩罚信号，学习最大化累积奖励的策略。"},
    {q:"以下属于监督学习任务的是（ ）。",o:["聚类","分类","降维","异常检测"],a:1,r:"分类是典型的监督学习任务，需要带标签的数据训练模型。"},
    {q:"以下属于无监督学习任务的是（ ）。",o:["回归","分类","聚类","标注"],a:2,r:"聚类是无监督学习的经典任务，将数据按相似性分组，无需标签。"},
    {q:"线性回归属于（ ）。",o:["监督学习","无监督学习","强化学习","半监督学习"],a:0,r:"线性回归属于监督学习，通过学习输入与连续输出之间的映射关系进行预测。"},
    {q:"K-means算法属于（ ）。",o:["监督学习","无监督学习","强化学习","半监督学习"],a:1,r:"K-means是经典的无监督聚类算法，将数据划分为K个簇。"},
    {q:"决策树属于（ ）。",o:["监督学习","无监督学习","强化学习","聚类学习"],a:0,r:"决策树属于监督学习，通过树形结构对数据进行分类或回归。"},
    {q:"DBSCAN是一种（ ）。",o:["监督分类算法","基于密度的聚类算法","回归算法","强化学习算法"],a:1,r:"DBSCAN是一种基于密度的聚类算法，可以发现任意形状的簇并处理噪声点。"},
    {q:"支持向量机SVM属于（ ）。",o:["监督学习","无监督学习","强化学习","聚类算法"],a:0,r:"支持向量机（SVM）属于监督学习，通过寻找最优分类超平面进行分类。"},
    {q:"朴素贝叶斯算法属于（ ）。",o:["监督学习","无监督学习","强化学习","降维算法"],a:0,r:"朴素贝叶斯属于监督学习，基于贝叶斯定理和特征条件独立假设进行分类。"},
    {q:"聚类的核心目标是（ ）。",o:["簇内相似、簇间差异大","拟合标签数据","最大化奖励","最小化回归误差"],a:0,r:"聚类的核心目标是使簇内样本尽可能相似、簇间样本尽可能不同。"},
    {q:"主成分分析PCA属于（ ）。",o:["聚类算法","降维算法","分类算法","强化算法"],a:1,r:"PCA（主成分分析）是一种降维算法，通过线性变换将数据投影到低维空间。"},
    {q:"以下不属于监督学习算法的是（ ）。",o:["KNN","决策树","K-means","线性回归"],a:2,r:"K-means是无监督聚类算法，不属于监督学习。KNN、决策树、线性回归均为监督学习算法。"},
    {q:"以下不属于无监督学习算法的是（ ）。",o:["DBSCAN","PCA","SVM","Apriori"],a:2,r:"SVM（支持向量机）是监督学习算法，不属于无监督学习。"},
    {q:"房价预测属于（ ）。",o:["分类任务","回归任务","聚类任务","强化任务"],a:1,r:"房价预测是回归任务，预测连续数值输出。"},
    {q:"机器学习模型训练的核心目的是（ ）。",o:["记住训练数据","提升泛化能力","增大预测误差","固定模型参数"],a:1,r:"模型训练的核心目的是提升泛化能力，即在未见数据上也有良好表现。"},
    {q:"数据分割的主要目的是（ ）。",o:["扩大数据量","训练与评估分离，保证泛化能力","减少计算量","加密数据"],a:1,r:"数据分割（训练集/测试集）的目的是训练与评估分离，保证对泛化能力的客观评估。"},
    {q:"模型的泛化能力是指（ ）。",o:["在训练集上表现好","在新数据上表现好","训练速度快","模型体积小"],a:1,r:"泛化能力指模型在未见过的测试数据上表现良好的能力，是衡量模型好坏的关键指标。"},
    {q:"过拟合的表现是（ ）。",o:["训练好、泛化差","训练差、泛化好","训练泛化都好","训练泛化都差"],a:0,r:"过拟合表现为模型在训练集上表现很好，但在测试集上表现差，即泛化能力差。"},
    {q:"以下能缓解过拟合的是（ ）。",o:["增大模型","增加训练轮次","正则化/数据增强","减少训练数据"],a:2,r:"正则化和数据增强是缓解过拟合的有效方法，增加模型复杂度或减少数据会加剧过拟合。"},
    {q:"联邦学习的核心特点是（ ）。",o:["数据集中训练","数据不出本地","不需要模型","不需要计算"],a:1,r:"联邦学习的核心特点是数据不出本地，在各方本地训练后只共享模型更新，保护隐私。"},
    {q:"横向联邦学习适用于（ ）。",o:["特征相同、样本不同","样本相同、特征不同","特征样本均不同","仅单节点数据"],a:0,r:"横向联邦学习适用于参与方特征空间相同但样本空间不同的场景，如不同地区的银行客户数据。"},
    {q:"在人工神经网络中，用于解决梯度消失问题的激活函数是（ ）。",o:["Sigmoid","Tanh","ReLU","Softmax"],a:2,r:"ReLU（修正线性单元）在正区间梯度恒为1，有效缓解了梯度消失问题。"},
    {q:"卷积神经网络中，池化层的主要作用是（ ）。",o:["增加特征维度","减少参数数量，降低计算量","引入非线性","提高模型的泛化能力"],a:1,r:"池化层通过下采样减少特征图尺寸，从而减少参数数量和计算量，同时增强平移不变性。"},
    {q:"以下哪种优化算法可以自适应调整学习率？（ ）",o:["随机梯度下降算法","动量梯度下降算法","AdaGrad算法","批量梯度下降算法"],a:2,r:"AdaGrad可以根据参数的历史梯度自动调整学习率，稀疏特征上学习率大，频繁特征上学习率小。"},
    {q:"循环神经网络在处理长序列数据时存在的主要问题是（ ）。",o:["计算复杂度较高","梯度消失或爆炸","难以并行计算","以上都是"],a:3,r:"RNN在长序列上面临梯度消失/爆炸、难以并行计算、计算复杂度高等多重问题。"},
    {q:"残差神经网络通过什么机制解决了深层网络中的梯度消失问题？（ ）",o:["引入跳跃连接","使用更大的卷积核","增加正则化项","改变激活函数"],a:0,r:"ResNet通过引入跳跃连接（skip connection），使梯度能直接传播到浅层，解决了梯度消失问题。"},
    {q:"Softmax函数通常用于（ ）。",o:["二分类问题","多分类问题","回归问题","聚类问题"],a:1,r:"Softmax函数将输出转换为概率分布，常用于多分类问题的输出层。"},

        let state = {subjects:[],currentSubject:null,currentQuestions:[],currentIndex:0,answers:{},stats:{total:0,correct:0,streak:0,maxStreak:0}};

        function init(){
            loadState();
            renderSubjects();
            renderQuiz();
            updateStats();
        }

        function loadState(){
            const saved = localStorage.getItem('tibo_state');
            if(saved){
                const parsed = JSON.parse(saved);
                state.subjects = parsed.subjects || [];
                state.stats = parsed.stats || state.stats;
            }
            if(state.subjects.length === 0){
                state.subjects = [...defaultSubjects];
                // 分配题目到各科目
                defaultQuestions.forEach((q,i)=>{
                    const subjectIndex = i % 3;
                    const subject = state.subjects[subjectIndex];
                    if(!localStorage.getItem(`tibo_${subject}`)){
                        localStorage.setItem(`tibo_${subject}`,JSON.stringify([]));
                    }
                    const existing = JSON.parse(localStorage.getItem(`tibo_${subject}`)||'[]');
                    if(!existing.find(x=>x.q===q.q)){
                        existing.push(q);
                        localStorage.setItem(`tibo_${subject}`,JSON.stringify(existing));
                    }
                });
                saveState();
            }
        }

        function saveState(){
            localStorage.setItem('tibo_state',JSON.stringify({subjects:state.subjects,stats:state.stats}));
        }

        function renderSubjects(){
            const list = document.getElementById('subjectList');
            list.innerHTML = state.subjects.map(s=>`
                <div class="subject-tag ${state.currentSubject===s?'active':''}" onclick="selectSubject('${s}')">
                    ${s}
                    <button class="delete" onclick="event.stopPropagation();deleteSubject('${s}')">×</button>
                </div>
            `).join('');
        }

        function selectSubject(name){
            state.currentSubject = name;
            const data = JSON.parse(localStorage.getItem(`tibo_${name}`)||'[]');
            state.currentQuestions = data;
            state.currentIndex = 0;
            state.answers = {};
            renderSubjects();
            renderQuiz();
            showToast(`已切换到「${name}」`, 'info');
        }

        function addSubject(){
            const input = document.getElementById('newSubjectInput');
            const name = input.value.trim();
            if(name && !state.subjects.includes(name)){
                state.subjects.push(name);
                localStorage.setItem(`tibo_${name}`,JSON.stringify([]));
                saveState();
                renderSubjects();
                input.value = '';
                showToast(`新科目「${name}」已创建！`, 'success');
            }
        }

        function deleteSubject(name){
            if(confirm(`确定删除科目「${name}」？`)){
                state.subjects = state.subjects.filter(s=>s!==name);
                localStorage.removeItem(`tibo_${name}`);
                if(state.currentSubject === name){
                    state.currentSubject = null;
                    state.currentQuestions = [];
                }
                saveState();
                renderSubjects();
                renderQuiz();
                updateStats();
            }
        }

        function renderQuiz(){
            const area = document.getElementById('quizArea');
            if(!state.currentSubject || state.currentQuestions.length === 0){
                area.innerHTML = `<div class="empty-state"><div class="icon">📖</div><h2>欢迎使用题宝！</h2><p>选择或添加科目开始刷题</p></div>`;
                return;
            }
            const q = state.currentQuestions[state.currentIndex];
            const answered = state.answers[state.currentIndex] !== undefined;
            area.innerHTML = `
                <div class="quiz-header">
                    <h2>${state.currentSubject}</h2>
                    <span class="quiz-meta">第 ${state.currentIndex+1} / ${state.currentQuestions.length} 题</span>
                </div>
                <div class="progress-bar"><div class="fill" style="width:${((state.currentIndex+1)/state.currentQuestions.length)*100}%"></div></div>
                <div class="question" style="margin-top:20px">${q.q}</div>
                <ul class="options">${q.o.map((opt,i)=>{
                    let cls = '';
                    if(answered){
                        if(i===q.a) cls='correct';
                        else if(i===state.answers[state.currentIndex]) cls='wrong';
                    }
                    return `<li class="${cls}" onclick="${answered?'':'selectAnswer('+i+')'}">${String.fromCharCode(65+i)}. ${opt}</li>`;
                }).join('')}</ul>
                ${answered?`<div class="result ${state.answers[state.currentIndex]===q.a?'pass':'fail'}">
                    <div style="font-size:1.1rem;font-weight:600;margin-bottom:8px">${state.answers[state.currentIndex]===q.a?'✅ 回答正确！':'❌ 回答错误'}</div>
                    ${q.r?`<div class="explanation"><strong>解析：</strong>${q.r}</div>`:''}
                </div>`:''}
                <div class="actions">
                    ${state.currentIndex>0?'<button class="btn-warning" onclick="prevQuestion()">← 上一题</button>':''}
                    ${answered?(state.currentIndex<state.currentQuestions.length-1?'<button class="btn-primary" onclick="nextQuestion()">下一题 →</button>':'<button class="btn-success" onclick="finishQuiz()">🏁 完成练习</button>'):''}
                </div>
            `;
        }

        function selectAnswer(idx){
            const q = state.currentQuestions[state.currentIndex];
            const correct = idx === q.a;
            state.answers[state.currentIndex] = idx;
            
            if(correct){
                state.stats.correct++;
                state.stats.streak++;
                state.stats.maxStreak = Math.max(state.stats.maxStreak,state.stats.streak);
                showToast('✨ 回答正确！', 'success');
            }else{
                state.stats.streak = 0;
                showToast('❌ 回答错误，查看解析', 'error');
            }
            state.stats.total++;
            saveState();
            updateStats();
            renderQuiz();
        }

        function nextQuestion(){
            state.currentIndex++;
            renderQuiz();
        }

        function prevQuestion(){
            state.currentIndex--;
            renderQuiz();
        }

        function finishQuiz(){
            const correct = Object.entries(state.answers).filter(([i,a])=>a===state.currentQuestions[+i].a).length;
            const total = state.currentQuestions.length;
            const pct = Math.round((correct/total)*100);
            
            showToast(`练习完成！正确率 ${pct}%`, pct>=60?'success':'info');
            
            setTimeout(()=>{
                state.currentSubject = null;
                state.currentQuestions = [];
                renderSubjects();
                renderQuiz();
            },3000);
        }

        function updateStats(){
            const allQuestions = state.subjects.reduce((sum,s)=>{
                return sum + JSON.parse(localStorage.getItem(`tibo_${s}`)||'[]').length;
            },0);
            document.getElementById('totalQuestions').textContent = allQuestions;
            document.getElementById('completedCount').textContent = state.stats.total;
            document.getElementById('accuracy').textContent = state.stats.total?Math.round((state.stats.correct/state.stats.total)*100)+'%':'0%';
            document.getElementById('streak').textContent = state.stats.maxStreak;
        }

        function toggleTheme(){
            document.body.classList.toggle('dark');
            showToast(document.body.classList.contains('dark')?'已切换到深色模式':'已切换到浅色模式', 'info');
        }

        function showImport(){
            const section = document.getElementById('importSection');
            section.style.display = section.style.display==='none'?'block':'none';
        }

        function handleFileImport(event){
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e){
                const content = e.target.result;
                const lines = content.split('\n').filter(l=>l.trim());
                const questions = lines.map(line=>{
                    const parts = line.split('||');
                    if(parts.length>=6){
                        return{
                            q:parts[0].trim(),
                            o:[parts[1].trim(),parts[2].trim(),parts[3].trim(),parts[4].trim()],
                            a:parseInt(parts[5])-1,
                            r:parts[6]?parts[6].trim():''
                        };
                    }
                    return null;
                }).filter(q=>q);
                if(questions.length && state.currentSubject){
                    const existing = JSON.parse(localStorage.getItem(`tibo_${state.currentSubject}`)||'[]');
                    const newQ = questions.filter(q=>!existing.find(x=>x.q===q.q));
                    existing.push(...newQ);
                    localStorage.setItem(`tibo_${state.currentSubject}`,JSON.stringify(existing));
                    state.currentQuestions = existing;
                    saveState();
                    updateStats();
                    renderQuiz();
                    showToast(`成功导入 ${newQ.length} 道新题目！`, 'success');
                } else if (questions.length) {
                    showToast('请先选择一个科目！', 'error');
                }
            };
            reader.readAsText(file);
        }

        function resetProgress(){
            if(confirm('确定重置所有进度？（科目和题目会保留）')){
                state.stats = {total:0,correct:0,streak:0,maxStreak:0};
                state.answers = {};
                saveState();
                updateStats();
                renderQuiz();
                showToast('进度已重置，从头开始！', 'info');
            }
        }

        // Toast 系统
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✅', error: '❌', info: '📢' };
            toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        init();
    </script>
</body>
</html>
