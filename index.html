<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7EC8C9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="题宝">
<link rel="apple-touch-icon" href="tibo-mascot.png">
<title>题宝~TiBo - 智能刷题助手</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --primary: #7EC8C9;
  --primary-light: #B5DCD9;
  --primary-dark: #5BA3A6;
  --primary-bg: #E8F5F2;
  --bg: #F2F9F8;
  --card-bg: #ffffff;
  --text: #333333;
  --text-secondary: #666666;
  --border: #e0e0e0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
  --correct: #7EC8C9;
  --wrong: #E8B4B8;
  --radius: 16px;
  --font: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
}
[data-theme="dark"] {
  --primary: #7EC8C9;
  --primary-light: #B5DCD9;
  --primary-dark: #4CAF50;
  --primary-bg: #1b2e1b;
  --bg: #1b2e1b;
  --card-bg: #2a3f3e;
  --text: #e0e0e0;
  --text-secondary: #a0a0a0;
  --border: #3a5a59;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-hover: 0 4px 20px rgba(0,0,0,0.4);
}

/* ===== Reset & Base ===== */
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
body { padding-bottom: 80px; }

/* ===== Splash Screen ===== */
#splash {
  position: fixed; top:0; left:0; width:100%; height:100%;
  z-index: 10000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(145deg, #5BA3A6 0%, #7EC8C9 60%, #B5DCD9 100%);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide {
  opacity: 0; transform: scale(1.1);
  pointer-events: none;
}
#splash video {
  position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;
}
#splash-overlay {
  position: absolute; top:0; left:0; width:100%; height:100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.15);
  backdrop-filter: blur(4px);
}
#splash-logo {
  width: 100px; height: 100px;
  border-radius: 24px;
  animation: splashFloat 2s ease-in-out infinite;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
#splash h1 {
  font-size: 48px; color: #fff; font-weight: 800;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  animation: fadeInUp 1s ease 0.3s both;
}
#splash p {
  font-size: 18px; color: rgba(255,255,255,0.85); margin-top: 8px;
  animation: fadeInUp 1s ease 0.6s both;
}
#splash-skip {
  position: absolute; bottom: 60px;
  padding: 12px 32px; border: 2px solid rgba(255,255,255,0.6);
  border-radius: 30px; background: transparent; color: #fff;
  font-size: 16px; cursor: pointer;
  animation: fadeInUp 1s ease 0.9s both;
  transition: all 0.3s;
}
#splash-skip:hover { background: rgba(255,255,255,0.2); }

@keyframes splashFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
@keyframes fadeInUp {
  from { opacity:0; transform: translateY(30px); }
  to { opacity:1; transform: translateY(0); }
}

/* ===== Animations ===== */
@keyframes slideUpIn {
  from { opacity:0; transform: translateY(40px); }
  to { opacity:1; transform: translateY(0); }
}
@keyframes slideInRight {
  from { opacity:0; transform: translateX(40px); }
  to { opacity:1; transform: translateX(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
@keyframes scaleIn {
  from { opacity:0; transform: scale(0.8); }
  to { opacity:1; transform: scale(1); }
}
@keyframes bounceIn {
  0% { opacity:0; transform: scale(0.3); }
  50% { opacity:1; transform: scale(1.05); }
  70% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes jump {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-20px); }
  50% { transform: translateY(-10px); }
  70% { transform: translateY(-15px); }
}
@keyframes confettiFall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity:1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
}
@keyframes ripple {
  to { transform: scale(4); opacity:0; }
}
@keyframes cardEnter {
  from { opacity:0; transform: translateX(30px); }
  to { opacity:1; transform: translateX(0); }
}
@keyframes cardExit {
  from { opacity:1; transform: translateX(0); }
  to { opacity:0; transform: translateX(-30px); }
}
@keyframes particleFloat {
  0%, 100% { transform: translate(0, 0); opacity:0.6; }
  25% { transform: translate(10px, -20px); opacity:1; }
  50% { transform: translate(-5px, -40px); opacity:0.4; }
  75% { transform: translate(15px, -20px); opacity:0.8; }
}

/* ===== Header ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
  animation: slideUpIn 0.5s ease;
}
.header-left {
  display: flex; align-items: center; gap: 8px;
}
.header-logo {
  width: 36px; height: 36px; border-radius: 10px;
  object-fit: cover;
}
.header-title {
  font-size: 20px; font-weight: 700; color: var(--primary-dark);
}
.header-right {
  display: flex; align-items: center; gap: 8px;
}
.header-btn {
  width: 40px; height: 40px; border-radius: 12px;
  border: none; background: var(--primary-bg);
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.header-btn:hover { background: var(--primary-light); color: #fff; }

/* ===== Subject Tabs ===== */
.subject-tabs {
  display: flex; gap: 8px; padding: 12px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  animation: fadeIn 0.5s ease 0.2s both;
}
.subject-tabs::-webkit-scrollbar { display: none; }
.subject-tab {
  flex-shrink: 0;
  padding: 8px 16px; border-radius: 20px;
  border: 2px solid var(--primary);
  background: transparent; color: var(--primary);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.3s; white-space: nowrap;
}
.subject-tab.active {
  background: var(--primary); color: #fff;
}
.subject-tab:hover:not(.active) {
  background: var(--primary-bg);
}

/* ===== Progress Bar ===== */
.progress-container {
  padding: 0 16px; margin-bottom: 12px;
  animation: fadeIn 0.5s ease 0.3s both;
}
.progress-bar {
  height: 8px; border-radius: 4px;
  background: var(--border); overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--primary-light));
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
  transition: width 0.5s ease;
}
.progress-text {
  font-size: 12px; color: var(--text-secondary); margin-top: 4px;
  text-align: right;
}

/* ===== Question Card ===== */
.question-card {
  margin: 0 16px 16px; padding: 20px;
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow);
  transition: all 0.3s;
  animation: cardEnter 0.4s ease;
  border-top: 4px solid var(--primary-light);
}
.question-card.exit {
  animation: cardExit 0.3s ease forwards;
}
.question-number {
  font-size: 13px; color: var(--primary); font-weight: 600;
  margin-bottom: 8px;
}
.question-text {
  font-size: 16px; line-height: 1.6; margin-bottom: 16px;
  color: var(--text);
}

/* ===== Options ===== */
.options-list {
  display: flex; flex-direction: column; gap: 10px;
}
.option-btn {
  position: relative; overflow: hidden;
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--card-bg); cursor: pointer;
  transition: all 0.3s; text-align: left;
  animation: scaleIn 0.3s ease both;
}
.option-btn:nth-child(1) { animation-delay: 0.05s; }
.option-btn:nth-child(2) { animation-delay: 0.1s; }
.option-btn:nth-child(3) { animation-delay: 0.15s; }
.option-btn:nth-child(4) { animation-delay: 0.2s; }
.option-btn:hover:not(.disabled) {
  border-color: var(--primary); background: var(--primary-bg);
}
.option-btn.correct {
  border-color: var(--correct); background: rgba(126,200,201,0.1);
  animation: bounceIn 0.5s ease;
}
.option-btn.wrong {
  border-color: var(--wrong); background: rgba(232,180,184,0.1);
  animation: shake 0.5s ease;
}
.option-btn.disabled { pointer-events: none; opacity: 0.7; }
.option-btn.disabled.correct { opacity: 1; }
.option-btn.disabled.wrong { opacity: 1; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.option-label {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--text-secondary);
  transition: all 0.3s;
}
.option-btn.correct .option-label {
  border-color: var(--correct); background: var(--correct); color: #fff;
}
.option-btn.wrong .option-label {
  border-color: var(--wrong); background: var(--wrong); color: #fff;
}
.option-text {
  font-size: 15px; line-height: 1.5; padding-top: 2px;
}

/* ===== Explanation ===== */
.explanation {
  margin-top: 16px; padding: 14px 16px;
  border-radius: 12px; background: var(--primary-bg);
  border-left: 4px solid var(--primary);
  animation: slideUpIn 0.4s ease;
  display: none;
}
.explanation.show { display: block; }
.explanation-title {
  font-size: 14px; font-weight: 700; color: var(--primary-dark); margin-bottom: 6px;
}
.explanation-text {
  font-size: 14px; line-height: 1.6; color: var(--text);
}

/* ===== Action Buttons ===== */
.action-row {
  display: flex; gap: 10px; padding: 0 16px; margin-bottom: 16px;
  animation: fadeIn 0.5s ease 0.4s both;
}
.action-btn {
  flex: 1; padding: 12px; border-radius: 12px;
  border: none; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  position: relative; overflow: hidden;
}
.action-btn.primary {
  background: var(--primary); color: #fff;
}
.action-btn.primary:hover { background: var(--primary-dark); }
.action-btn.secondary {
  background: var(--primary-bg); color: var(--primary-dark);
  border: 1px solid var(--primary);
}
.action-btn.secondary:hover { background: var(--primary-light); color: #fff; }

/* ===== Swipe Hint ===== */
.swipe-hint {
  text-align: center; padding: 8px;
  font-size: 12px; color: var(--text-secondary);
  animation: fadeIn 1s ease 1s both;
}

/* ===== Bottom Nav ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: var(--card-bg); border-top: 1px solid var(--border);
  display: flex; z-index: 200;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 0; cursor: pointer; transition: all 0.2s;
  border: none; background: transparent; color: var(--text-secondary);
  font-size: 11px; gap: 2px;
  position: relative;
}
.nav-item.active { color: var(--primary); }
.nav-item.active .nav-icon {
  transform: translateY(-3px) scale(1.08);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 3px;
  background: var(--primary);
  border-radius: 0 0 3px 3px;
  animation: navIndicator 0.3s ease;
}
@keyframes navIndicator {
  from { width: 0; opacity: 0; }
  to { width: 32px; opacity: 1; }
}
.nav-icon { font-size: 22px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* ===== Pages ===== */
.page { display: none; padding: 16px; }
.page.active { display: block; animation: fadeIn 0.3s ease; }

/* ===== Stats Page ===== */
.stats-card {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
  animation: slideUpIn 0.4s ease both;
}
.stats-card:nth-child(2) { animation-delay: 0.1s; }
.stats-card:nth-child(3) { animation-delay: 0.2s; }
.stats-title {
  font-size: 16px; font-weight: 700; margin-bottom: 12px;
  color: var(--primary-dark);
}
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 14px; color: var(--text-secondary); }
.stat-value { font-size: 18px; font-weight: 700; color: var(--primary); }
.stat-bar {
  height: 6px; border-radius: 3px; background: var(--border);
  margin-top: 4px; overflow: hidden;
}
.stat-bar-fill {
  height: 100%; border-radius: 3px; background: var(--primary);
  transition: width 0.5s ease;
}

/* ===== Question List Page ===== */
.search-box {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 2px solid var(--border); background: var(--card-bg);
  font-size: 15px; color: var(--text); outline: none;
  font-family: var(--font); margin-bottom: 12px;
  transition: border-color 0.3s;
}
.search-box:focus { border-color: var(--primary); }
.q-list-item {
  padding: 14px 16px; border-radius: 12px;
  background: var(--card-bg); margin-bottom: 8px;
  box-shadow: var(--shadow); cursor: pointer;
  transition: all 0.2s; border-left: 4px solid var(--primary);
}
.q-list-item:hover { transform: translateX(4px); box-shadow: var(--shadow-hover); }
.q-list-item .q-num { font-size: 12px; color: var(--primary); font-weight: 600; }
.q-list-item .q-text {
  font-size: 14px; line-height: 1.5; margin-top: 4px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ===== Wrong Book & Favorites ===== */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-secondary);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 16px; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.5); z-index: 500;
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 24px; width: 90%; max-width: 400px; max-height: 80vh;
  overflow-y: auto; box-shadow: var(--shadow-hover);
  animation: scaleIn 0.3s ease;
}
.modal-title {
  font-size: 18px; font-weight: 700; margin-bottom: 16px;
  color: var(--primary-dark);
}
.modal-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--bg);
  font-size: 14px; color: var(--text); outline: none;
  font-family: var(--font); margin-bottom: 12px;
}
.modal-input:focus { border-color: var(--primary); }
.modal-btns {
  display: flex; gap: 10px; margin-top: 16px;
}
.modal-btn {
  flex: 1; padding: 10px; border-radius: 10px;
  border: none; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.modal-btn.confirm { background: var(--primary); color: #fff; }
.modal-btn.cancel { background: var(--border); color: var(--text); }
.modal-btn.danger { background: var(--wrong); color: #fff; }

/* ===== TIBO Mascot ===== */
.tibo-mascot {
  position: fixed; bottom: 90px; right: 16px; z-index: 300;
  cursor: grab; user-select: none; touch-action: none;
}
.tibo-mascot:active { cursor: grabbing; }
.tibo-img {
  width: 80px; height: 80px; border-radius: 50%;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  animation: jump 2s ease-in-out infinite;
  transition: transform 0.2s;
}
.tibo-bubble {
  position: absolute; bottom: 90px; right: 0;
  background: var(--card-bg); border-radius: 16px;
  padding: 10px 14px; box-shadow: var(--shadow);
  font-size: 14px; color: var(--text); white-space: nowrap;
  animation: bounceIn 0.5s ease;
  border: 2px solid var(--primary-light);
}
.tibo-bubble::after {
  content: ''; position: absolute; bottom: -8px; right: 20px;
  border: 8px solid transparent; border-top-color: var(--card-bg);
}

/* ===== Particles ===== */
.particles {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%;
  animation: particleFloat linear infinite;
}

/* ===== Confetti ===== */
.confetti-piece {
  position: fixed; top: -20px; z-index: 9999;
  width: 10px; height: 10px; border-radius: 2px;
  animation: confettiFall linear forwards;
  pointer-events: none;
}

/* ===== Ripple ===== */
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transform: scale(0);
  animation: ripple 0.6s linear;
  pointer-events: none;
}

/* ===== Responsive ===== */
@media (min-width: 768px) {
  .question-card { max-width: 600px; margin: 0 auto 16px; }
  .action-row { max-width: 632px; margin: 0 auto 16px; }
  .progress-container { max-width: 632px; margin: 0 auto 12px; }
  .swipe-hint { max-width: 632px; margin: 0 auto; }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 2px; }

/* ===== Import area ===== */
.import-area {
  margin-top: 12px; padding: 20px;
  border: 2px dashed var(--border); border-radius: var(--radius);
  text-align: center; cursor: pointer; transition: all 0.3s;
}
.import-area:hover { border-color: var(--primary); background: var(--primary-bg); }
.import-text { font-size: 14px; color: var(--text-secondary); }
</style>
</head>
<body>
<!-- Particles Background -->
<div class="particles" id="particles"></div>

<!-- Splash Screen -->
<div id="splash">
  <video id="splash-video" autoplay muted playsinline loop>
    <source src="splash-video.mp4" type="video/mp4">
  </video>
  <div id="splash-overlay">
    <img id="splash-logo" src="tibo-mascot.png" alt="TiBo"
         onerror="this.style.display='none'"
         style="width:120px;height:120px;border-radius:24px;object-fit:cover;margin-bottom:16px;
                box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:splashFloat 2s ease-in-out infinite;">
    <video id="splash-mascot-video" autoplay muted playsinline loop
      style="position:absolute;width:120px;height:120px;border-radius:24px;object-fit:cover;
             margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:splashFloat 2s ease-in-out infinite;
             top:calc(50% - 100px);left:50%;transform:translateX(-50%);">
      <source src="tibo-mascot.mp4" type="video/mp4">
    </video>
    <h1>题宝</h1>
    <p>TiBo - 智能刷题助手</p>
    <button id="splash-skip" onclick="closeSplash()">开始刷题 ✨</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <img class="header-logo" src="tibo-mascot.png" onerror="this.style.display='none'" alt="TiBo">
    <span class="header-title">题宝~TiBo</span>
  </div>
  <div class="header-right">
    <button class="header-btn" onclick="toggleTheme()" title="切换主题" id="theme-btn">&#9728;&#65039;</button>
    <button class="header-btn" onclick="showSubjectModal()" title="科目管理">&#9881;&#65039;</button>
  </div>
</div>

<!-- Subject Tabs -->
<div class="subject-tabs" id="subject-tabs"></div>

<!-- Progress Bar -->
<div class="progress-container" id="progress-container">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-text" id="progress-text">0 / 0</div>
</div>

<!-- Main Quiz Page -->
<div class="page active" id="page-quiz">
  <div class="question-card" id="question-card">

// ===== Web Audio 音效合成 =====
function playSplashSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    const now = ctx.currentTime;

    // 主音调 - 轻快的上升琶音 (C5 E5 G5 C6)
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.12, now + i * 0.12 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.6);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.12);
      osc.stop(now + i * 0.12 + 0.6);
    });

    // 清脆的高音点缀
    const sparkle = ctx.createOscillator();
    const sparkleGain = ctx.createGain();
    sparkle.type = 'triangle';
    sparkle.frequency.setValueAtTime(1318.51, now + 0.4);
    sparkle.frequency.exponentialRampToValueAtTime(2093.00, now + 0.8);
    sparkleGain.gain.setValueAtTime(0, now);
    sparkleGain.gain.linearRampToValueAtTime(0.08, now + 0.45);
    sparkleGain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    sparkle.connect(sparkleGain);
    sparkleGain.connect(ctx.destination);
    sparkle.start(now + 0.4);
    sparkle.stop(now + 1.0);

    // 柔和的低音铺垫
    const bass = ctx.createOscillator();
    const bassGain = ctx.createGain();
    bass.type = 'sine';
    bass.frequency.value = 261.63;
    bassGain.gain.setValueAtTime(0, now);
    bassGain.gain.linearRampToValueAtTime(0.06, now + 0.2);
    bassGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
    bass.connect(bassGain);
    bassGain.connect(ctx.destination);
    bass.start(now);
    bass.stop(now + 1.2);
  } catch(e) { console.log('Audio not supported'); }
}

function initSplash() {
  // 播放启动音效
  playSplashSound();

  // 背景视频加载失败时隐藏
  const video = document.getElementById('splash-video');
  if (video) {
    video.addEventListener('error', function() {
      video.style.display = 'none';
    });
  }

  // Q版精灵视频：加载成功则显示并播放，失败则隐藏（图片fallback可见）
  const mascotVideo = document.getElementById('splash-mascot-video');
  if (mascotVideo) {
    mascotVideo.addEventListener('canplay', function() {
      mascotVideo.style.display = 'block';
      mascotVideo.play().catch(() => {});
    });
    mascotVideo.addEventListener('error', function() {
      mascotVideo.style.display = 'none';
    });
    // 如果3秒内没加载成功，隐藏视频
    setTimeout(function() {
      if (mascotVideo.readyState < 2) {
        mascotVideo.style.display = 'none';
      }
    }, 3000);
  }

  setTimeout(closeSplash, 8000);
}

function closeSplash() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  splash.classList.add('hide');
  setTimeout(() => { splash.style.display = 'none'; }, 800);
}

// localStorage
// ============================================================
function loadState() {
  try {
    const saved = localStorage.getItem('tibo_state');
    if (saved) {
      const s = JSON.parse(saved);
      // Merge saved state
      state.currentSubject = s.currentSubject || 'final';
      state.currentIndex = s.currentIndex || 0;
      state.theme = s.theme || 'light';
      state.subjects = s.subjects || [];
      // Restore Sets from arrays
      state.answered = {};
      state.favorites = {};
      if (s.answered) {
        for (const k in s.answered) state.answered[k] = new Set(s.answered[k]);
      }
      if (s.favorites) {
        for (const k in s.favorites) state.favorites[k] = new Set(s.favorites[k]);
      }
      state.wrongBook = s.wrongBook || {};
      state.stats = s.stats || {};
    }
  } catch(e) { console.error('Load state error:', e); }
}

function saveState() {
  try {
    const s = {
      currentSubject: state.currentSubject,
      currentIndex: state.currentIndex,
      theme: state.theme,
      subjects: state.subjects,
      answered: {},
      favorites: {},
      wrongBook: state.wrongBook,
      stats: state.stats
    };
    for (const k in state.answered) s.answered[k] = [...state.answered[k]];
    for (const k in state.favorites) s.favorites[k] = [...state.favorites[k]];
    localStorage.setItem('tibo_state', JSON.stringify(s));
  } catch(e) { console.error('Save state error:', e); }
}

function renderSubjectTabs() {
  const container = document.getElementById('subject-tabs');
  container.innerHTML = '';
  state.subjects.forEach(sub => {

    btn.className = 'subject-tab' + (sub.id === state.currentSubject ? ' active' : '');
    btn.textContent = sub.name;
    btn.onclick = () => switchSubject(sub.id);
    container.appendChild(btn);
  });
}

}

      const delBtn = document.createElement('button');
      delBtn.className = 'modal-btn danger';
      delBtn.style.cssText = 'flex:none;width:auto;padding:6px 12px;font-size:12px';
      delBtn.textContent = '删除';
      delBtn.onclick = () => removeSubject(sub.id);
      div.appendChild(delBtn);
    }
    list.appendChild(div);
  });
  modal.classList.add('show');
}

function closeSubjectModal() {
  document.getElementById('subject-modal').classList.remove('show');
}

function addSubject() {
  const name = document.getElementById('new-subject-name').value.trim();
  const cat = document.getElementById('new-subject-category').value.trim() || ('custom_' + Date.now());
  if (!name) return;
  state.subjects.push({ id: cat, name: name, category: cat });
  saveState();
  renderSubjectTabs();
  document.getElementById('new-subject-name').value = '';
  document.getElementById('new-subject-category').value = '';
  closeSubjectModal();
}

function removeSubject(id) {
  state.subjects = state.subjects.filter(s => s.id !== id);
  if (state.currentSubject === id) {
    state.currentSubject = state.subjects[0]?.id || 'final';
  }
  saveState();
  renderSubjectTabs();
  renderQuestion();
  updateProgress();
  showSubjectModal();
}

// ============================================================
// Get questions for current subject
// ============================================================
function getCurrentQuestions() {
  const sub = state.subjects.find(s => s.id === state.currentSubject);
  if (!sub) return defaultQuestions;
  const cat = sub.category || sub.id;
  return defaultQuestions.filter(q => q.c === cat);
}

// ============================================================
// Render Question
// ============================================================
function renderQuestion() {
  const questions = getCurrentQuestions();
  if (questions.length === 0) {
    document.getElementById('question-card').innerHTML = '<div class="empty-state"><div class="empty-icon">&#128218;</div><div class="empty-text">暂无题目</div></div>';
    return;
  }
  if (state.currentIndex >= questions.length) state.currentIndex = 0;
  if (state.currentIndex < 0) state.currentIndex = questions.length - 1;

  const q = questions[state.currentIndex];
  const subId = state.currentSubject;
  const isAnswered = state.answered[subId]?.has(state.currentIndex);
  const isFav = state.favorites[subId]?.has(state.currentIndex);

  document.getElementById('question-number').textContent = `第 ${state.currentIndex + 1} / ${questions.length} 题`;
  document.getElementById('question-text').textContent = q.q;

  const labels = ['A', 'B', 'C', 'D'];
  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (isAnswered) {
      btn.classList.add('disabled');
      if (i === q.a) btn.classList.add('correct');
    }
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span class="option-text">${opt}</span>`;
    btn.onclick = () => selectOption(i);
    optList.appendChild(btn);
  });

  // Explanation
  const expEl = document.getElementById('explanation');
  const expText = document.getElementById('explanation-text');
  if (isAnswered && q.r) {
    expText.textContent = q.r;
    expEl.classList.add('show');
  } else {
    expEl.classList.remove('show');
  }

  // Favorite button
  updateFavButton(isFav);

  // Card animation
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'cardEnter 0.4s ease';
}

function updateFavButton(isFav) {
  const btn = document.getElementById('fav-btn');
  btn.innerHTML = isFav ? '&#11088; 已收藏' : '&#9734; 收藏';
}

// ============================================================
// Select Option
// ============================================================
function selectOption(index) {
  const questions = getCurrentQuestions();
  const q = questions[state.currentIndex];
  const subId = state.currentSubject;

  if (state.answered[subId]?.has(state.currentIndex)) return;

  // Init sets
  if (!state.answered[subId]) state.answered[subId] = new Set();
  if (!state.stats[subId]) state.stats[subId] = { correct:0, total:0, history:[] };

  state.answered[subId].add(state.currentIndex);
  state.stats[subId].total++;

  const isCorrect = index === q.a;
  if (isCorrect) {
    state.stats[subId].correct++;
    triggerConfetti();
    triggerHaptic('correct');
    tiboHappy();
  } else {
    state.stats[subId].wrong = (state.stats[subId].wrong || 0) + 1;
    // Add to wrong book
    if (!state.wrongBook[subId]) state.wrongBook[subId] = [];
    if (!state.wrongBook[subId].includes(state.currentIndex)) {
      state.wrongBook[subId].push(state.currentIndex);
    }
    triggerHaptic('wrong');
    tiboCheer();
  }

  // Update history
  state.stats[subId].history.push(isCorrect ? 1 : 0);
  if (state.stats[subId].history.length > 100) state.stats[subId].history.shift();

  saveState();

  // Update UI
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.a) btn.classList.add('correct');
    if (i === index && !isCorrect) btn.classList.add('wrong');
  });

  // Show explanation
  if (q.r) {
    document.getElementById('explanation-text').textContent = q.r;
    document.getElementById('explanation').classList.add('show');
  }

  updateProgress();
}

// ============================================================
// Navigation
// ============================================================
function nextQuestion() {
  const questions = getCurrentQuestions();
  state.currentIndex = (state.currentIndex + 1) % questions.length;
  saveState();
  renderQuestion();
  updateProgress();
}

function prevQuestion() {
  const questions = getCurrentQuestions();
  state.currentIndex = (state.currentIndex - 1 + questions.length) % questions.length;
  saveState();
  renderQuestion();
  updateProgress();
}

function goToQuestion(index) {
  state.currentIndex = index;
  saveState();
  switchPage('quiz');
  renderQuestion();
  updateProgress();
}

// ============================================================
// Progress
// ============================================================
function updateProgress() {
  const questions = getCurrentQuestions();
  const subId = state.currentSubject;
  const answered = state.answered[subId]?.size || 0;
  const total = questions.length;
  const pct = total > 0 ? (answered / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
}

// ============================================================
// Favorites
// ============================================================
function toggleFavorite() {
  const subId = state.currentSubject;
  if (!state.favorites[subId]) state.favorites[subId] = new Set();
  if (state.favorites[subId].has(state.currentIndex)) {
    state.favorites[subId].delete(state.currentIndex);
  } else {
    state.favorites[subId].add(state.currentIndex);
  }
  saveState();
  updateFavButton(state.favorites[subId].has(state.currentIndex));
}

// ============================================================
// Page Switching
// ============================================================
function switchPage(page) {
  state.currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });
  if (page === 'list') renderQuestionList();
  if (page === 'wrong') renderWrongBook();
  if (page === 'fav') renderFavorites();
  if (page === 'stats') renderStats();
}

// ============================================================
// Question List
// ============================================================
function renderQuestionList(filter = '') {
  const questions = getCurrentQuestions();
  const container = document.getElementById('question-list-container');
  container.innerHTML = '';
  const filtered = filter
    ? questions.filter((q, i) => q.q.includes(filter) || q.o.some(o => o.includes(filter)))
    : questions;
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-text">没有找到匹配的题目</div></div>';
    return;
  }
  filtered.forEach((q, fi) => {
    const realIndex = questions.indexOf(q);
    const div = document.createElement('div');
    div.className = 'q-list-item';
    div.innerHTML = `<div class="q-num">第${realIndex + 1}题</div><div class="q-text">${q.q}</div>`;
    div.onclick = () => goToQuestion(realIndex);
    div.style.animationDelay = (fi * 0.03) + 's';
    div.style.animation = 'slideUpIn 0.3s ease both';
    container.appendChild(div);
  });
}

function filterQuestionList() {
  const val = document.getElementById('search-box').value.trim();
  renderQuestionList(val);
}

// ============================================================
// Wrong Book
// ============================================================
function renderWrongBook() {
  const subId = state.currentSubject;
  const questions = getCurrentQuestions();
  const wrongIndices = state.wrongBook[subId] || [];
  const container = document.getElementById('wrong-book-container');
  container.innerHTML = '';
  if (wrongIndices.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#127942;</div><div class="empty-text">太棒了，没有错题！</div></div>';
    return;
  }
  container.innerHTML = `<div style="margin-bottom:12px;font-size:14px;color:var(--text-secondary)">共 ${wrongIndices.length} 道错题</div>`;
  wrongIndices.forEach(idx => {
    if (idx >= questions.length) return;
    const q = questions[idx];
    const div = document.createElement('div');
    div.className = 'q-list-item';
    div.style.borderLeftColor = 'var(--wrong)';
    div.innerHTML = `<div class="q-num">第${idx + 1}题</div><div class="q-text">${q.q}</div>`;
    div.onclick = () => goToQuestion(idx);
    container.appendChild(div);
  });
  // Clear button
  const clearBtn = document.createElement('button');
  clearBtn.className = 'action-btn secondary';
  clearBtn.style.marginTop = '12px';
  clearBtn.textContent = '清空错题本';
  clearBtn.onclick = () => {
    state.wrongBook[subId] = [];
    saveState();
    renderWrongBook();
  };
  container.appendChild(clearBtn);
}

// ============================================================
// Favorites
// ============================================================
function renderFavorites() {
  const subId = state.currentSubject;
  const questions = getCurrentQuestions();
  const favIndices = state.favorites[subId] ? [...state.favorites[subId]] : [];
  const container = document.getElementById('favorites-container');
  container.innerHTML = '';
  if (favIndices.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#11088;</div><div class="empty-text">暂无收藏题目</div></div>';
    return;
  }
  favIndices.forEach(idx => {
    if (idx >= questions.length) return;
    const q = questions[idx];
    const div = document.createElement('div');
    div.className = 'q-list-item';
    div.style.borderLeftColor = '#FFC107';
    div.innerHTML = `<div class="q-num">第${idx + 1}题</div><div class="q-text">${q.q}</div>`;
    div.onclick = () => goToQuestion(idx);
    container.appendChild(div);
  });
}

// ============================================================
// Stats
// ============================================================
function renderStats() {
  const container = document.getElementById('stats-container');
  container.innerHTML = '';
  state.subjects.forEach(sub => {
    const questions = defaultQuestions.filter(q => q.c === (sub.category || sub.id));
    const stats = state.stats[sub.id] || { correct:0, total:0, history:[] };
    const answered = state.answered[sub.id]?.size || 0;
    const rate = stats.total > 0 ? Math.round(stats.correct / stats.total * 100) : 0;

    const card = document.createElement('div');
    card.className = 'stats-card';
    card.innerHTML = `
      <div class="stats-title">${sub.name}</div>
      <div class="stat-row">
        <span class="stat-label">总题数</span>
        <span class="stat-value">${questions.length}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">已答题</span>
        <span class="stat-value">${answered}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">正确率</span>
        <span class="stat-value">${rate}%</span>
      </div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${rate}%"></div></div>
      <div class="stat-row">
        <span class="stat-label">错题数</span>
        <span class="stat-value">${(state.wrongBook[sub.id] || []).length}</span>
      </div>
    `;
    container.appendChild(card);
  });

  // Category distribution
  const distCard = document.createElement('div');
  distCard.className = 'stats-card';
  distCard.innerHTML = '<div class="stats-title">题目分布</div>';
  const cats = [
    { name: '期末综合', cat: 'final', color: '#7EC8C9' },
    { name: '第1-3章', cat: 'chapters1_3', color: '#2196F3' },
    { name: '第4-6章', cat: 'chapters4_6', color: '#FF9800' }
  ];
  cats.forEach(c => {
    const count = defaultQuestions.filter(q => q.c === c.cat).length;
    const answered = state.answered[c.cat]?.size || 0;
    distCard.innerHTML += `
      <div class="stat-row">
        <span class="stat-label">${c.name}</span>
        <span class="stat-value">${answered}/${count}</span>
      </div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${count > 0 ? (answered/count*100) : 0}%;background:${c.color}"></div></div>
    `;
  });
  container.appendChild(distCard);
}

// ============================================================
// Theme
// ============================================================
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  saveState();
  updateThemeUI();
  checkLateNight();
}

function updateThemeUI() {
  document.documentElement.setAttribute('data-theme', state.theme);
  const btn = document.getElementById('theme-btn');
  btn.innerHTML = state.theme === 'dark' ? '&#127769;' : '&#9728;&#65039;';
}

// ============================================================
// Confetti
// ============================================================
function triggerConfetti() {
  const colors = ['#7EC8C9', '#B5DCD9', '#FFD700', '#E8B4B8', '#64B5F6', '#BA68C8', '#FF8A65'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 5) + 'px';
    piece.style.height = (Math.random() * 8 + 5) + 'px';
    piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

// ============================================================
// Haptic Feedback
// ============================================================
function triggerHaptic(type) {
  if (navigator.vibrate) {
    if (type === 'correct') navigator.vibrate([50, 30, 50]);
    else if (type === 'wrong') navigator.vibrate([100, 50, 100]);
    else navigator.vibrate(10);
  }
}

// ============================================================
// Swipe Gesture
// ============================================================
function initSwipeGesture() {
  let startX = 0, startY = 0, isDragging = false;
  const card = document.getElementById('question-card');
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (!isDragging) return;
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const diffX = endX - startX;
    const diffY = endY - startY;
    if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
      if (diffX < 0) nextQuestion();
      else prevQuestion();
    }
    isDragging = false;
  }, { passive: true });
  // Mouse swipe for desktop
  card.addEventListener('mousedown', e => {
    startX = e.clientX; startY = e.clientY; isDragging = true;
  });
  card.addEventListener('mouseup', e => {
    if (!isDragging) return;
    const diffX = e.clientX - startX;
    const diffY = e.clientY - startY;
    if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
      if (diffX < 0) nextQuestion();
      else prevQuestion();
    }
    isDragging = false;
  });
}

// ============================================================
// TIBO Mascot Drag
// ============================================================
function initMascotDrag() {
  const mascot = document.getElementById('tibo-mascot');
  let isDragging = false, offsetX = 0, offsetY = 0;

  mascot.addEventListener('mousedown', startDrag);
  mascot.addEventListener('touchstart', startDrag, { passive: false });

  function startDrag(e) {
    isDragging = true;
    const pos = e.touches ? e.touches[0] : e;
    const rect = mascot.getBoundingClientRect();
    offsetX = pos.clientX - rect.left;
    offsetY = pos.clientY - rect.top;
    e.preventDefault();
  }

  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('touchmove', moveDrag, { passive: false });

  function moveDrag(e) {
    if (!isDragging) return;
    const pos = e.touches ? e.touches[0] : e;
    mascot.style.left = (pos.clientX - offsetX) + 'px';
    mascot.style.top = (pos.clientY - offsetY) + 'px';
    mascot.style.right = 'auto';
    mascot.style.bottom = 'auto';
    e.preventDefault();
  }

  document.addEventListener('mouseup', stopDrag);
  document.addEventListener('touchend', stopDrag);

  function stopDrag() { isDragging = false; }


  setInterval(() => {
    const bubble = document.getElementById('tibo-bubble');
    if (bubble) {
      bubble.textContent = TIBO_MESSAGES[Math.floor(Math.random() * TIBO_MESSAGES.length)];
      bubble.style.animation = 'none';
      bubble.offsetHeight;
      bubble.style.animation = 'bounceIn 0.5s ease';
    }
  }, 8000);
}

// ============================================================
// Ripple Effect
// ============================================================
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.action-btn, .subject-tab, .nav-item, .modal-btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

// ============================================================
// Import Questions (TXT format)
// ============================================================
function importQuestions(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.split('\n').filter(l => l.trim());
      let imported = 0;
      // Simple TXT format: question||A||B||C||D||answer||explanation
      lines.forEach(line => {
        const parts = line.split('||');
        if (parts.length >= 6) {
          const q = parts[0].trim();
          const opts = [parts[1].trim(), parts[2].trim(), parts[3].trim(), parts[4].trim()];
          const ans = parts[5].trim().toUpperCase();
          const idx = {'A':0,'B':1,'C':2,'D':3}[ans] ?? 0;
          const explanation = parts[6] ? parts[6].trim() : '';
          if (q && opts.every(o => o)) {
            defaultQuestions.push({ q, o: opts, a: idx, r: explanation, c: state.currentSubject });
            imported++;
          }
        }
      });
      alert('成功导入 ' + imported + ' 道题目！');
      renderQuestion();
      updateProgress();
    } catch(err) {
      alert('导入失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============================================================
// Keyboard shortcuts
// ============================================================
document.addEventListener('keydown', function(e) {
  if (state.currentPage !== 'quiz') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextQuestion();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevQuestion();
  if (e.key === '1') selectOption(0);
  if (e.key === '2') selectOption(1);
  if (e.key === '3') selectOption(2);
  if (e.key === '4') selectOption(3);
});

// ============================================================
// Start App
// ============================================================
init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      console.log('SW registered');
    }).catch(function(err) {
      console.log('SW failed:', err);
    });
  });
}
